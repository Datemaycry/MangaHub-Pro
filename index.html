    <script type="text/babel">
        window.addEventListener('touchmove', function(e) { 
            if (window.visualViewport && window.visualViewport.scale > 1.05) return;
            if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'range') return;
            if (e.target.closest('.custom-scrollbar') === null && e.target.closest('.shelf-scroll') === null) e.preventDefault(); 
        }, {passive: false});
        MobileDragDrop.polyfill({ holdToDrag: 250 });

        const { useState, useEffect, useMemo, useRef, useCallback, memo } = React;

        // === CONSTANTES GLOBALES DE PROPORTION MANGA ===
        // Ces valeurs garantissent que l'objet 3D et les tranches sur l'étagère partagent les mêmes mathématiques.
        const MANGA_PROPS = {
            faceW: 215, // Largeur de la face avant/arrière
            h: 320,     // Hauteur du livre
            spineW: 24  // Épaisseur de la tranche
        };

        // --- UTILS & DB ---
        const DB_NAME = "MangaHub_V12"; 
        const STORE_MANGAS = "mangas";
        const STORE_PAGES = "pages";

        const getSafeStorage = (key, defaultVal) => { try { return localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
        const setSafeStorage = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };
        const triggerHaptic = (pattern = 50) => { if (navigator.vibrate) try { navigator.vibrate(pattern); } catch (e) {} };

        const initDB = () => new Promise((res) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_MANGAS)) db.createObjectStore(STORE_MANGAS, {keyPath: "id"});
                if (!db.objectStoreNames.contains(STORE_PAGES)) db.createObjectStore(STORE_PAGES, {keyPath: "id"});
            };
            req.onsuccess = e => res(e.target.result);
        });

        const blobToBase64Async = (blob) => new Promise((resolve) => {
            if (!blob) return resolve(null);
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.readAsDataURL(blob);
        });

        const base64ToBlobAsync = async (base64, type) => {
            if (!base64) return null;
            const res = await fetch(`data:${type || 'application/octet-stream'};base64,${base64}`);
            return await res.blob();
        };

        const getArrayBuffer = (blob) => {
            return new Promise((resolve, reject) => {
                if (blob.arrayBuffer) {
                    blob.arrayBuffer().then(resolve).catch(reject);
                } else {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(blob);
                }
            });
        };

        const serializeFile = async (f) => {
            if (!f) return null;
            if (f instanceof Blob || f instanceof File) {
                try {
                    const buffer = await getArrayBuffer(f);
                    return { _isArrayBuffer: true, buffer, type: f.type, name: f.name };
                } catch(e) {
                    console.error("Erreur sérialisation", e);
                    return null;
                }
            }
            return f;
        };

        const deserializeFile = (f) => {
            if (!f) return null;
            if (f._isArrayBuffer && f.buffer) {
                try {
                    const blob = new Blob([f.buffer], { type: f.type || 'image/jpeg' });
                    blob.name = f.name;
                    return blob;
                } catch(e) {
                    console.error("Erreur désérialisation", e);
                    return null;
                }
            }
            return f; 
        };

        const createImageUrl = (file) => {
            if (!file) return null;
            if (file instanceof Blob || file instanceof File) {
                if (file.size === 0) return null;
                let validBlob = file;
                if (!file.type) {
                    const ext = (file.name || '').split('.').pop().toLowerCase();
                    let mimeType = 'image/jpeg';
                    if (ext === 'png') mimeType = 'image/png';
                    else if (ext === 'webp') mimeType = 'image/webp';
                    else if (ext === 'gif') mimeType = 'image/gif';
                    validBlob = new Blob([file], { type: mimeType });
                }
                return URL.createObjectURL(validBlob);
            }
            return null;
        };

        const globalImageCache = new Map();

        const clearImageCache = () => {
            globalImageCache.forEach(url => URL.revokeObjectURL(url));
            globalImageCache.clear();
        };

        const getCachedUrl = (file) => {
            if (!file) return null;
            if (globalImageCache.has(file)) return globalImageCache.get(file);
            const blob = deserializeFile(file);
            if (!blob) return null;
            const url = createImageUrl(blob);
            if (url) globalImageCache.set(file, url);
            return url;
        };

                    // Calcul du delta de réduction

                    let newScale = Math.min(1, ratioW, ratioH);
                    
                    // Léger bonus de sécurité en mode paysage sur mobile
                    if (safeW > safeH && safeH < 500) {
                        newScale = newScale * 0.85;
                    }
                    
                    setGlobalScale(newScale);
                };
                updateScale();
                window.addEventListener('resize', updateScale);
                return () => window.removeEventListener('resize', updateScale);
            }, []);

            // L'échelle du livre est maintenant FIXE à l'intérieur de sa boîte virtuelle !
            const scale = 1.4; 

            const isDouble = !!manga.coverDouble;
            const isRTL = manga.direction === 'rtl';
            const mainCover = manga.coverDouble || manga.coverStart || manga.cover;
            const coverUrl = getCachedUrl(mainCover);

            const bw = MANGA_PROPS.faceW;
            const bh = MANGA_PROPS.h;
            const bd = MANGA_PROPS.spineW;

            const wrapTotalW = (bw * 2) + bd;
            const bgSizeFrontBack = `${(wrapTotalW / bw) * 100}% 100%`;
            const bgSizeSpine = `${(wrapTotalW / bd) * 100}% 100%`;
            
            const bgPosFront = isRTL ? '0% 50%' : '100% 50%';
            const bgPosBack = isRTL ? '100% 50%' : '0% 50%';
            const bgPosSpine = '50% 50%';

            const spineIsRight = isRTL;

            // --- LOGIQUE INTERACTION 3D ---
            const [rotY, setRotY] = useState(isRTL ? -15 : 15);
            const [rotX, setRotX] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [autoSpin, setAutoSpin] = useState(true);
            const [isOpening, setIsOpening] = useState(false);
            const dragInfo = useRef({ startX: 0, startY: 0, initRotY: 0, initRotX: 0, hasDragged: false });

            useEffect(() => {
                if (!autoSpin) return;
                let animationFrameId;
                let lastTime = performance.now();
                const speedPerMs = (360 / 16000) * (isRTL ? -1 : 1); 
                
                const animate = (time) => {
                    const delta = time - lastTime;
                    lastTime = time;
                    setRotY(prev => prev + (delta * speedPerMs));
                    animationFrameId = requestAnimationFrame(animate);
                };
                animationFrameId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationFrameId);
            }, [autoSpin, isRTL]);

            const onPointerDown = (e) => {
                setAutoSpin(false); 
                setIsDragging(true);
                dragInfo.current = { startX: e.clientX, startY: e.clientY, initRotY: rotY, initRotX: rotX, hasDragged: false };
                e.currentTarget.setPointerCapture(e.pointerId);
            };

            const onPointerMove = (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - dragInfo.current.startX;
                const deltaY = e.clientY - dragInfo.current.startY;
                
                if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) dragInfo.current.hasDragged = true;
                
                setRotY(dragInfo.current.initRotY + deltaX * 0.6);
                setRotX(Math.max(-60, Math.min(60, dragInfo.current.initRotX - deltaY * 0.6))); 
            };

            const onPointerUp = (e) => {
                setIsDragging(false);
                if (e.currentTarget.hasPointerCapture(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId);
            };

            const handleReadClick = (e) => {
                e.stopPropagation();
                if (dragInfo.current.hasDragged) {
                    dragInfo.current.hasDragged = false;
                    return;
                }
                setAutoSpin(false); 
                setIsOpening(true);
                setTimeout(() => {
                    const fakeEvent = { currentTarget: document.getElementById('inspect-book-container') };
                    onRead(manga, fakeEvent, true);
                }, 500); 
            };

            // --- ANIMATION STYLE TOMB RAIDER (SLIDE 3D) ---
            const [trState, setTrState] = useState('idle');

            React.useLayoutEffect(() => {
                if (trState === 'leaving-next') {
                    setTrState('entering-next');
                    let frame2;
                    const frame1 = requestAnimationFrame(() => { frame2 = requestAnimationFrame(() => setTrState('idle')); });
                    return () => { cancelAnimationFrame(frame1); cancelAnimationFrame(frame2); };
                } else if (trState === 'leaving-prev') {
                    setTrState('entering-prev');
                    let frame2;
                    const frame1 = requestAnimationFrame(() => { frame2 = requestAnimationFrame(() => setTrState('idle')); });
                    return () => { cancelAnimationFrame(frame1); cancelAnimationFrame(frame2); };
                }
            }, [manga.id]);

            const handlePrev = useCallback((e) => {
                e.stopPropagation();
                if (!hasPrev || trState !== 'idle') return;
                setTrState('leaving-prev');
                setTimeout(() => onPrev(), 300);
            }, [hasPrev, onPrev, trState]);

            const handleNext = useCallback((e) => {
                e.stopPropagation();
                if (!hasNext || trState !== 'idle') return;
                setTrState('leaving-next');
                setTimeout(() => onNext(), 300);
            }, [hasNext, onNext, trState]);

            let trStyle = { transition: 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease', transform: 'translateX(0) translateZ(0) scale(1) rotateY(0deg)', opacity: 1 };
            if (trState === 'leaving-next') {
                trStyle = { transition: 'transform 0.3s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.3s ease', transform: 'translateX(-40vw) translateZ(-600px) scale(0.6) rotateY(60deg)', opacity: 0 };
            } else if (trState === 'entering-next') {
                trStyle = { transition: 'none', transform: 'translateX(40vw) translateZ(-600px) scale(0.6) rotateY(-60deg)', opacity: 0 };
            } else if (trState === 'leaving-prev') {
                trStyle = { transition: 'transform 0.3s cubic-bezier(0.5, 0, 0.75, 0), opacity 0.3s ease', transform: 'translateX(40vw) translateZ(-600px) scale(0.6) rotateY(-60deg)', opacity: 0 };
            } else if (trState === 'entering-prev') {
                trStyle = { transition: 'none', transform: 'translateX(-40vw) translateZ(-600px) scale(0.6) rotateY(60deg)', opacity: 0 };
            }

            return (
                <div className={`fixed inset-0 z-[1500] flex items-center justify-center transition-all duration-500 ${isAnimatingOut ? 'opacity-0 pointer-events-none' : 'animate-fade'} bg-black/80 backdrop-blur-xl`} onClick={onClose}>
                    
                    {/* ÉCRAN NOIR CINÉMATIQUE */}
                    <div className={`absolute inset-0 bg-black z-[2000] pointer-events-none transition-opacity duration-500 ease-out ${isOpening ? 'opacity-100' : 'opacity-0'}`}></div>

                    {/* Flèches de navigation (elles profitent aussi du pourcentage de réduction pour l'iPhone) */}
                    {hasPrev && (
                        <button onClick={handlePrev} style={{ transform: `translateY(-50%) scale(${globalScale})` }} className={`absolute left-2 sm:left-8 top-1/2 w-12 h-12 sm:w-16 sm:h-16 bg-black/50 hover:bg-theme-600/80 text-white rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 hover:border-theme-400 transition-all z-[1600] shadow-[0_0_20px_rgba(0,0,0,0.5)] hover:shadow-[0_0_30px_rgba(var(--theme-rgb),0.8)] active:scale-95 ${isOpening ? 'opacity-0 pointer-events-none' : ''}`}>
                            <IconChevronLeft width="32" height="32" />
                        </button>
                    )}
                    {hasNext && (
                        <button onClick={handleNext} style={{ transform: `translateY(-50%) scale(${globalScale})` }} className={`absolute right-2 sm:right-8 top-1/2 w-12 h-12 sm:w-16 sm:h-16 bg-black/50 hover:bg-theme-600/80 text-white rounded-full flex items-center justify-center backdrop-blur-md border border-white/10 hover:border-theme-400 transition-all z-[1600] shadow-[0_0_20px_rgba(0,0,0,0.5)] hover:shadow-[0_0_30px_rgba(var(--theme-rgb),0.8)] active:scale-95 ${isOpening ? 'opacity-0 pointer-events-none' : ''}`}>
                            <IconChevronRight width="32" height="32" />
                        </button>
                    )}

                    {/* === CANVAS VIRTUEL === */}
                    {/* Cette boîte reste mathématiquement parfaite et subit une réduction CSS pour les petits écrans */}
                    <div className="relative flex items-center justify-center pointer-events-none" style={{ width: '600px', height: '850px', transform: `scale(${globalScale})`, transformOrigin: 'center center' }}>
                        
                        {/* Contenu actif du Canvas */}
                        <div className={`relative flex flex-col items-center justify-center w-full px-4 transition-opacity duration-500 ease-out pointer-events-auto ${isOpening ? 'opacity-0' : 'opacity-100'}`} onClick={e => e.stopPropagation()}>
                            
                            {/* Wrapper Perspective - Hauteur garantie pour que le livre ne touche jamais les boutons */}
                            <div style={{ perspective: '2000px' }} className="flex justify-center items-center z-[1900] h-[520px] w-full mt-4">
                                
                                {/* TOMB RAIDER ANIMATION WRAPPER */}
                                <div style={{ ...trStyle, transformStyle: 'preserve-3d' }}>
                                    
                                    <div id="inspect-book-container" className="relative cursor-grab active:cursor-grabbing group touch-none" 
                                        style={{ 
                                            width: `${bw}px`, height: `${bh}px`, 
                                            animation: 'artifactFloat 6s ease-in-out infinite', 
                                            animationPlayState: isOpening ? 'paused' : 'running',
                                            transformStyle: 'preserve-3d', 
                                            transform: `scale(${scale}) translateY(0px)` // Échelle fixe dans le canvas virtuel
                                        }} 
                                        onClick={handleReadClick}
                                        onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
                                        
                                        {/* 3D Spin Wrapper */}
                                        <div className="w-full h-full relative" style={{ 
                                            transformStyle: 'preserve-3d', 
                                            transform: `rotateX(${rotX}deg) rotateY(${rotY}deg)`
                                        }}>
                                            
                                            {/* Face Avant (Couverture Début) */}
                                            <div className="absolute inset-0" style={{ transform: `translateZ(${bd/2}px)`, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
                                                {isDouble ? (
                                                    <div className="w-full h-full bg-black" style={{ backgroundImage: `url(${coverUrl})`, backgroundSize: bgSizeFrontBack, backgroundPosition: bgPosFront }}></div>
                                                ) : (
                                                    <div className="w-full h-full bg-black"><StackThumbnail file={manga.coverStart || manga.cover} /></div>
                                                )}
                                            </div>

                                            {/* Face Arrière (Couverture Fin) */}
                                            <div className="absolute inset-0" style={{ transform: `translateZ(${-bd/2}px) rotateY(180deg)`, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
                                                {isDouble ? (
                                                    <div className="w-full h-full bg-black" style={{ backgroundImage: `url(${coverUrl})`, backgroundSize: bgSizeFrontBack, backgroundPosition: bgPosBack }}></div>
                                                ) : (
                                                    <div className="w-full h-full bg-black"><StackThumbnail file={manga.coverEnd || manga.coverStart || manga.cover} /></div>
                                                )}
                                            </div>

                                            {/* Tranche Principale (Spine) */}
                                            <div className="absolute inset-y-0 bg-[#0f172a]" style={{ width: `${bd}px`, left: spineIsRight ? 'auto' : 0, right: spineIsRight ? 0 : 'auto', transform: `translateX(${spineIsRight ? bd/2 : -bd/2}px) rotateY(${spineIsRight ? 90 : -90}deg)` }}>
                                                {isDouble ? (
                                                    <div className="w-full h-full" style={{ backgroundImage: `url(${coverUrl})`, backgroundSize: bgSizeSpine, backgroundPosition: bgPosSpine }}></div>
                                                ) : (
                                                    <div className="w-full h-full flex items-center justify-center border-l border-white/20 border-r border-black/80">
                                                        <span className="text-white font-black text-[12px] uppercase tracking-widest whitespace-nowrap" style={{ transform: 'rotate(90deg)' }}>{manga.title}</span>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Tranche Pages (Opposée) */}
                                            <div className="absolute inset-y-0 bg-[#e8e4db]" style={{ width: `${bd}px`, left: spineIsRight ? 0 : 'auto', right: spineIsRight ? 'auto' : 0, transform: `translateX(${spineIsRight ? -bd/2 : bd/2}px) rotateY(${spineIsRight ? -90 : 90}deg)` }}>
                                                <div className="absolute inset-0 opacity-40 mix-blend-multiply bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzIiBoZWlnaHQ9IjMiPjxwYXRoIGQ9Ik0wLDBIM1YxSDBaIiBmaWxsPSIjMDAwIi8+PC9zdmc+')]"></div>
                                            </div>

                                            {/* Tranche Haut (Pages) */}
                                            <div className="absolute left-0 right-0 bg-[#e8e4db]" style={{ height: `${bd}px`, top: 0, transform: `translateY(${-bd/2}px) rotateX(90deg)` }}>
                                                <div className="absolute inset-0 opacity-40 mix-blend-multiply bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzIiBoZWlnaHQ9IjMiPjxwYXRoIGQ9Ik0wLDBIM1YxSDBaIiBmaWxsPSIjMDAwIi8+PC9zdmc+')]"></div>
                                            </div>

                                            {/* Tranche Bas (Pages) */}
                                            <div className="absolute left-0 right-0 bg-[#e8e4db]" style={{ height: `${bd}px`, bottom: 0, transform: `translateY(${bd/2}px) rotateX(-90deg)` }}>
                                                <div className="absolute inset-0 opacity-40 mix-blend-multiply bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzIiBoZWlnaHQ9IjMiPjxwYXRoIGQ9Ik0wLDBIM1YxSDBaIiBmaWxsPSIjMDAwIi8+PC9zdmc+')]"></div>
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            {/* Méta-données & Boutons d'action */}
                            <div className="flex flex-col items-center gap-6 w-full max-w-lg z-30 mt-6">
                                <div className="text-center px-4 w-full">
                                    <span className="text-theme-400 font-black uppercase tracking-widest text-xs mb-2 block drop-shadow-md">
                                        {manga.group || "Volume Indépendant"}
                                    </span>
                                    <h2 className="text-3xl font-black text-white uppercase tracking-tighter drop-shadow-[0_0_20px_rgba(var(--theme-rgb),0.8)] line-clamp-2 w-full">
                                        {manga.title}
                                    </h2>
                                    {manga.bookmark != null && (
                                        <span className="inline-block mt-4 bg-theme-600/30 border border-theme-500 text-theme-100 text-sm font-black px-5 py-2 rounded-full shadow-[0_0_15px_rgba(var(--theme-rgb),0.4)]">
                                            Reprendre page {manga.bookmark + 1}
                                        </span>
                                    )}
                                </div>

                                <div className="flex items-center gap-4 w-full mt-4">
                                    <button onClick={onClose} className="flex-1 py-5 rounded-2xl bg-white/5 text-white/70 font-black uppercase tracking-widest text-xs hover:bg-white/10 hover:text-white transition-colors border border-white/10 active:scale-95">
                                        Remettre
                                    </button>
                                    <button onClick={handleReadClick} className="flex-[2] py-5 rounded-2xl bg-theme-600 text-white font-black uppercase tracking-widest text-sm hover:bg-theme-500 transition-all shadow-[0_0_20px_rgba(var(--theme-rgb),0.6)] hover:shadow-[0_0_30px_rgba(var(--theme-rgb),1)] hover:scale-105 active:scale-95 flex items-center justify-center gap-2 border border-theme-400">
                                        <IconPlay width="22" height="22" /> {manga.bookmark != null ? 'Continuer' : 'Ouvrir'}
                                    </button>
                                    <button onClick={(e) => { e.stopPropagation(); onOpenMenu(manga); }} className="w-14 h-[60px] rounded-2xl bg-white/5 text-white/70 hover:bg-white/10 hover:text-white transition-colors border border-white/10 active:scale-95 flex items-center justify-center flex-none" title="Options du manga">
                                        <IconSettings width="22" height="22" />
                                    </button>
                                </div>
                            </div>
                            
                        </div>
                    </div>
                </div>
            );
        });

        const AddChapterModal = memo(({ onClose, onSuccess, setLoading, setImportProgress, showToast, existingGroups = [] }) => {
            const [formTitle, setFormTitle] = useState("");
            const [formGroup, setFormGroup] = useState("");
            const [formMangaDir, setFormMangaDir] = useState('rtl');
            const [formTags, setFormTags] = useState("");
            
            const [coverStartFile, setCoverStartFile] = useState(null);
            const [coverStartPreview, setCoverStartPreview] = useState(null);
            const [coverEndFile, setCoverEndFile] = useState(null);
            const [coverEndPreview, setCoverEndPreview] = useState(null);
            const [coverDoubleFile, setCoverDoubleFile] = useState(null);
            const [coverDoublePreview, setCoverDoublePreview] = useState(null);

            const [orderedPages, setOrderedPages] = useState([]);
            const [rawPages, setRawPages] = useState([]);
            const [isManualSorting, setIsManualSorting] = useState(false);
            const [sortMethod, setSortMethod] = useState('name-asc');

            useEffect(() => {
                return () => {
                    if (coverStartPreview) URL.revokeObjectURL(coverStartPreview);
                    if (coverEndPreview) URL.revokeObjectURL(coverEndPreview);
                    if (coverDoublePreview) URL.revokeObjectURL(coverDoublePreview);
                };
            }, [coverStartPreview, coverEndPreview, coverDoublePreview]);

            useEffect(() => {
                if (!rawPages.length || sortMethod === 'custom') return;
                let files = [...rawPages];
                if (sortMethod === 'name-asc') files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
                else if (sortMethod === 'date-asc') files.sort((a, b) => a.lastModified - b.lastModified);
                else if (sortMethod === 'date-desc') files.sort((a, b) => b.lastModified - a.lastModified);
                setOrderedPages(files);
            }, [rawPages, sortMethod]);

            const handlePagesSelection = (e) => { if (e.target.files && e.target.files.length > 0) { setRawPages(Array.from(e.target.files)); setSortMethod('name-asc'); setIsManualSorting(false); } };

            const handleZipImport = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setCoverStartFile(null); setCoverStartPreview(null); setCoverEndFile(null); setCoverEndPreview(null); setCoverDoubleFile(null); setCoverDoublePreview(null);
                setLoading(true); setImportProgress("Lecture archive...");
                try {
                    const zip = new JSZip(); await zip.loadAsync(file);
                    let metadata = null; if (zip.file("metadata.json")) { try { metadata = JSON.parse(await zip.file("metadata.json").async("string")); } catch(e) {} }
                    const filesMap = {}; const imagePromises = [];
                    zip.forEach((relativePath, zipEntry) => {
                        if (!zipEntry.dir && !relativePath.includes('__MACOSX') && !relativePath.endsWith('metadata.json')) {
                            const p = zipEntry.async('arraybuffer').then(buffer => {
                                const nameParts = relativePath.split('/');
                                const fileName = nameParts[nameParts.length - 1];
                                const ext = fileName.split('.').pop().toLowerCase();
                                let mimeType = 'image/jpeg';
                                if (ext === 'png') mimeType = 'image/png';
                                else if (ext === 'webp') mimeType = 'image/webp';
                                else if (ext === 'gif') mimeType = 'image/gif';
                                
                                const blob = new Blob([buffer], { type: mimeType });
                                blob.name = fileName;
                                filesMap[relativePath] = blob; return blob;
                            });
                            imagePromises.push(p);
                        }
                    });
                    await Promise.all(imagePromises);
                    if (metadata) {
                        setImportProgress("Restauration..."); 
                        setFormTitle(metadata.title || ""); 
                        setFormMangaDir(metadata.direction || "rtl"); 
                        if (metadata.group) setFormGroup(metadata.group);
                        const importedTags = new Set((metadata.tags || []).map(t => t.toUpperCase())); 
                        setFormTags(Array.from(importedTags).join(', '));
                        
                        if (metadata.coverStart && filesMap[metadata.coverStart]) { setCoverStartFile(filesMap[metadata.coverStart]); setCoverStartPreview(URL.createObjectURL(filesMap[metadata.coverStart])); }
                        if (metadata.coverEnd && filesMap[metadata.coverEnd]) { setCoverEndFile(filesMap[metadata.coverEnd]); setCoverEndPreview(URL.createObjectURL(filesMap[metadata.coverEnd])); }
                        if (metadata.coverDouble && filesMap[metadata.coverDouble]) { setCoverDoubleFile(filesMap[metadata.coverDouble]); setCoverDoublePreview(URL.createObjectURL(filesMap[metadata.coverDouble])); }
                        const pages = (metadata.pages || []).map(p => filesMap[p]).filter(Boolean);
                        setOrderedPages(pages); setRawPages(pages);
                    } else {
                        const images = Object.values(filesMap).filter(f => f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i)).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
                        if (images.length === 0) throw new Error("Archive vide");
                        setFormTitle(file.name.replace(/\.(zip|cbz)$/i, '')); setOrderedPages(images); setRawPages(images);
                        setCoverStartFile(images[0]); setCoverStartPreview(URL.createObjectURL(images[0]));
                    }
                    setLoading(false); setImportProgress(null);
                } catch (error) { console.error("Erreur zip:", error); showToast("Erreur de lecture de l'archive.", "error"); setLoading(false); setImportProgress(null); }
                e.target.value = ''; 
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!orderedPages.length || (!coverStartFile && !coverDoubleFile)) { showToast("Couverture et pages requises !", "error"); return; }
                setLoading(true); setImportProgress("Préparation des fichiers...");
                try {
                    const mangaId = "m_"+Date.now();
                    const newTags = formTags.split(',').map(t => t.trim().toUpperCase()).filter(Boolean);
                    const finalGroup = formGroup.trim() || null;
                    
                    const sCoverDouble = await serializeFile(coverDoubleFile);
                    const sCoverStart = await serializeFile(coverStartFile);
                    const sCoverEnd = await serializeFile(coverEndFile);
                    const fallbackCover = coverStartFile || coverDoubleFile;
                    const sCover = await serializeFile(fallbackCover);
                    
                    const sOrderedPages = [];
                    for(let i=0; i<orderedPages.length; i++){
                        setImportProgress(`Optimisation page ${i+1}/${orderedPages.length}`);
                        sOrderedPages.push(await serializeFile(orderedPages[i]));
                    }
                    
                    const db = await initDB();
                    const tx = db.transaction([STORE_MANGAS, STORE_PAGES], "readwrite");
                    
                    tx.objectStore(STORE_MANGAS).add({
                        id: mangaId, title: formTitle || "Sans titre", group: finalGroup, direction: formMangaDir, tags: newTags, 
                        coverDouble: sCoverDouble, coverStart: sCoverStart, coverEnd: sCoverEnd, cover: sCover,
                        totalPages: orderedPages.length, progress: 0, date: Date.now()
                    });
                    
                    tx.objectStore(STORE_PAGES).add({ id: mangaId, pages: sOrderedPages });
                    
                    tx.oncomplete = () => { setLoading(false); setImportProgress(null); triggerHaptic(100); onSuccess(); };
                } catch (error) { console.error(error); setLoading(false); setImportProgress(null); showToast("Erreur lors de l'importation.", "error"); }
            };

            const DragAndDropSort = () => {
                const handleDragStart = (e, index) => { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', index); };
                const handleDragOver = (e, index) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
                const handleDrop = (e, index) => {
                    e.preventDefault(); e.stopPropagation();
                    const draggedIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
                    if (!isNaN(draggedIdx) && draggedIdx !== index) {
                        const newPages = [...orderedPages];
                        const item = newPages.splice(draggedIdx, 1)[0];
                        newPages.splice(index, 0, item);
                        setOrderedPages(newPages);
                        setSortMethod('custom');
                    }
                };
                if (!isManualSorting) return null;
                return (
                    <div className="fixed inset-0 z-[400] bg-black/95 p-4 sm:p-8 lg:p-12 flex flex-col animate-fade backdrop-blur-md">
                        <div className="flex justify-between items-center mb-8 border-b border-theme-600/30 pb-6 flex-none animate-in w-full mx-auto md:px-8">

                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest mb-4" style={{ textShadow: '0 0 20px rgba(var(--theme-rgb),0.8)' }}>Chapitre Terminé</h2>
                            {nextChapter ? (
                                <div className="animate-in w-full max-w-lg flex flex-col items-center">
                                    <div className="bg-black/80 border border-theme-600/40 shadow-[0_0_40px_rgba(var(--theme-rgb),0.3)] rounded-3xl p-6 w-full mb-8 flex items-center gap-6">
                                        <div className="w-24 h-36 bg-black rounded-xl overflow-hidden flex-none shadow-[0_0_15px_rgba(var(--theme-rgb),0.4)] border border-theme-600/50"><StackThumbnail file={nextChapter.coverStart || nextChapter.coverDouble || nextChapter.cover} contain={nextChapter.isDoubleCover || !!nextChapter.coverDouble} /></div>
                                        <div className="flex-1 overflow-hidden"><span className="text-xs text-theme-400 font-black uppercase tracking-widest block mb-2" style={{ textShadow: '0 0 10px rgba(var(--theme-rgb),0.8)' }}>{currentManga?.group ? 'Suite de la Pile' : 'Suivant'}</span><h3 className="text-xl md:text-2xl text-white font-black truncate">{nextChapter.title}</h3></div>
                                    </div>
                                    <div className="flex gap-4 w-full">
                                        <button onClick={() => { handleCloseReader(); setShowNextChapterOverlay(false); }} className="flex-1 py-5 bg-black text-theme-400 border border-theme-600/40 font-black text-xs rounded-2xl uppercase transition hover:bg-theme-950/30 hover:border-theme-500">Bibliothèque</button>
                                        <button onClick={() => { if (currentManga && allSpreads) saveProgress(currentManga.id, cursor, true, allSpreads.length); setCurrentManga(nextChapter); setCursor(nextChapter.bookmark != null ? nextChapter.bookmark : (nextChapter.progress || 0)); markAsRead(nextChapter); setShowNextChapterOverlay(false); }} className="flex-[2] py-5 bg-theme-600 text-white font-black text-sm rounded-2xl uppercase transition shadow-[0_0_20px_rgba(var(--theme-rgb),0.5)] hover:shadow-[0_0_30px_rgba(var(--theme-rgb),0.8)] hover:scale-105">Lancer la suite</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-8 mt-6 w-full max-w-sm animate-in">
                                    <p className="text-theme-300/80 text-lg text-center font-bold">{currentManga?.group ? 'Vous avez terminé cette série pour le moment.' : 'Vous avez atteint la fin de la lecture de la sélection.'}</p>
                                    <button onClick={() => { handleCloseReader(); setShowNextChapterOverlay(false); }} className="w-full py-5 bg-theme-600/20 text-theme-300 border border-theme-500 font-black text-xs rounded-2xl uppercase transition shadow-[0_0_15px_rgba(var(--theme-rgb),0.4)] hover:shadow-[0_0_25px_rgba(var(--theme-rgb),0.6)]">Retour à la bibliothèque</button>
                                </div>
                            )}
                        </div>
                    )}

                    <div className={`reader-ui-bottom ${zenMode ? 'opacity-0 pointer-events-none translate-y-full' : 'opacity-100 translate-y-0'} pb-[max(25px,env(safe-area-inset-bottom))]`} onClick={(e) => e.stopPropagation()} onPointerDown={(e) => e.stopPropagation()}>
                        <div className="bg-black/80 backdrop-blur-xl p-5 sm:p-6 rounded-3xl border border-theme-600/40 flex flex-col items-center shadow-[0_0_40px_rgba(var(--theme-rgb),0.3)] w-full max-w-4xl gap-3 sm:gap-4 relative">
                            
                            <div className="flex justify-between items-center w-full px-3 mb-1">
                                <span className="text-xs sm:text-sm text-theme-400 font-bold">{cursor + 1}</span>
                                <span className="text-xs sm:text-sm font-black text-white uppercase tracking-widest" style={{ textShadow: '0 0 10px rgba(var(--theme-rgb),0.8)' }}>{allSpreads[cursor]?.info}</span>
                                <span className="text-xs sm:text-sm text-theme-400 font-bold">{allSpreads.length}</span>
                            </div>

                            <div className="relative w-full h-8 flex items-center">
                                <div className={`absolute bottom-full mb-3 -translate-x-1/2 transition-all duration-200 pointer-events-none z-[160] flex flex-col items-center ${isSliderActive ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-4 scale-95'}`}
                                     style={{ left: `calc(${percent}% + (${12 - percent * 0.24}px))` }}>

                                     <div className="bg-black/90 backdrop-blur-sm text-theme-100 text-[10px] font-black px-4 py-1.5 rounded-full shadow-[0_0_15px_rgba(var(--theme-rgb),0.5)] border border-theme-500/50 whitespace-nowrap mb-2 transform -translate-y-1 drop-shadow-lg">
                                         {allSpreads[previewCursor]?.info}
                                     </div>

                                     <div className="bg-slate-900/95 backdrop-blur-xl border-[2px] border-theme-500/80 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.9),0_0_30px_rgba(var(--theme-rgb),0.5)] overflow-hidden h-32 sm:h-48 aspect-auto min-w-[80px] sm:min-w-[120px] flex items-center justify-center p-1 relative">
                                         <div className="w-full h-full relative flex items-center justify-center bg-transparent rounded-xl overflow-hidden">
                                            {allSpreads[previewCursor] && (
                                                allSpreads[previewCursor].center ? (
                                                    <StackThumbnail file={allSpreads[previewCursor].center} contain={true} />
                                                ) : (
                                                    <div className="flex w-full h-full bg-theme-900/50">
                                                        <div className="w-1/2 h-full relative"><StackThumbnail file={allSpreads[previewCursor].left} contain={true} className="object-right" /></div>
                                                        <div className="w-1/2 h-full relative -ml-[1px]"><StackThumbnail file={allSpreads[previewCursor].right} contain={true} className="object-left" /></div>
                                                    </div>
                                                )
                                            )}
                                         </div>
                                     </div>

                                     <div className="w-0 h-0 border-l-[10px] border-r-[10px] border-t-[10px] border-l-transparent border-r-transparent border-t-theme-500/80 mt-[-2px]"></div>
                                </div>

                                <input type="range" min="0" max={maxVal} value={previewCursor}
                                    onTouchStart={(e) => { e.stopPropagation(); setIsSliderActive(true); }}
                                    onTouchMove={(e) => { e.stopPropagation(); }}
                                    onTouchEnd={(e) => { e.stopPropagation(); setIsSliderActive(false); handleSetCursor(Number(e.target.value)); }}
                                    onPointerDown={(e) => { e.stopPropagation(); setIsSliderActive(true); }}
                                    onPointerUp={(e) => { e.stopPropagation(); setIsSliderActive(false); handleSetCursor(Number(e.target.value)); }}
                                    onChange={(e) => setPreviewCursor(Number(e.target.value))}
                                    className="w-full h-2 rounded-lg appearance-none cursor-pointer custom-range z-10 relative" 
                                    style={{ touchAction: 'none' }}
                                />
                            </div>

                        </div>
                    </div>
                </div>
            );
        });

        // --- APPLICATION ROOT ---
        const App = () => {
            const [toast, setToast] = useState(null);
            const showToast = useCallback((msg, type = 'info') => { 
                // On bloque silencieusement l'affichage de toutes les notifications vertes (succès)
                if (type === 'success') return; 
                setToast({ msg, type, id: Date.now() }); 
            }, []);
            useEffect(() => { if (toast) { const timer = setTimeout(() => setToast(null), 3500); return () => clearTimeout(timer); } }, [toast]);

            const [isLandscape, setIsLandscape] = useState(window.innerWidth > window.innerHeight);
            const [displayMode, setDisplayMode] = useState('auto'); // 'auto', 'single', 'double'
            const effectiveLandscape = displayMode === 'auto' ? isLandscape : displayMode === 'double';

            const toggleDisplayMode = useCallback((e) => {
                if (e) e.stopPropagation();
                setDisplayMode(prev => {
                    const currentlyLandscape = prev === 'auto' ? isLandscape : prev === 'double';
                    return currentlyLandscape ? 'single' : 'double';
                });
            }, [isLandscape]);

            const [appTheme, setAppTheme] = useState(() => getSafeStorage('mangaHubTheme', 'blue'));
            const [isNightMode, setIsNightMode] = useState(() => getSafeStorage('mangaHubNightMode', 'false') === 'true');
            const [shelfTheme, setShelfTheme] = useState(() => getSafeStorage('mangaHubShelfTheme', 'mahogany'));

            useEffect(() => { document.body.setAttribute('data-theme', appTheme); setSafeStorage('mangaHubTheme', appTheme); }, [appTheme]);
            useEffect(() => { setSafeStorage('mangaHubNightMode', isNightMode.toString()); }, [isNightMode]);
            useEffect(() => { setSafeStorage('mangaHubShelfTheme', shelfTheme); }, [shelfTheme]);

            useEffect(() => {
                const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
                window.addEventListener('resize', handleResize); window.addEventListener('orientationchange', handleResize);
                return () => { window.removeEventListener('resize', handleResize); window.removeEventListener('orientationchange', handleResize); };
            }, []);

            const [currentTime, setCurrentTime] = useState("");
            useEffect(() => {
                const updateClock = () => { setCurrentTime(new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })); };
                updateClock(); const timer = setInterval(updateClock, 30000); return () => clearInterval(timer);
            }, []);

            const [view, setView] = useState('hub');
            const [mangas, setMangas] = useState([]);
            const [search, setSearch] = useState("");
            const [currentManga, setCurrentManga] = useState(null);
            const [currentPages, setCurrentPages] = useState([]);
            const [animatingManga, setAnimatingManga] = useState(null);
            const [isExitingReader, setIsExitingReader] = useState(false); 
            
            const [inspectingManga, setInspectingManga] = useState(null);

            const [isAdding, setIsAdding] = useState(false);
            const [loading, setLoading] = useState(false);
            const [importProgress, setImportProgress] = useState(null);
            const [cursor, setCursor] = useState(0); 
            const [zenMode, setZenMode] = useState(false);
            const [showNextChapterOverlay, setShowNextChapterOverlay] = useState(false); 
            const [slideDir, setSlideDir] = useState('next'); 
            const [prevCursor, setPrevCursor] = useState(null); 
            const [edgeGlow, setEdgeGlow] = useState(null); 

            const [drag, setDrag] = useState({ active: false, startX: 0, diffX: 0, progress: 0, dir: null, targetCursor: null, snapping: false });
            const dragRaf = useRef(null);

            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [purgeConfirm, setPurgeConfirm] = useState(false);
            const [editingManga, setEditingManga] = useState(null);
            const [activeCardMenu, setActiveCardMenu] = useState(null); 

            const [activeTags, setActiveTags] = useState([]); 
            const [showTags, setShowTags] = useState(false); 
            const [showBookmarksOnly, setShowBookmarksOnly] = useState(false);
            const [showGlobalSettings, setShowGlobalSettings] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedMangas, setSelectedMangas] = useState(new Set());
            const [batchDeleteConfirm, setBatchDeleteConfirm] = useState(false);
            const [showBatchEditModal, setShowBatchEditModal] = useState(false);

            const existingGroups = useMemo(() => {
                const groups = new Set(mangas.map(m => m.group).filter(Boolean));
                return Array.from(groups).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
            }, [mangas]);

            const loadMangas = async () => {
                const db = await initDB();
                db.transaction(STORE_MANGAS).objectStore(STORE_MANGAS).getAll().onsuccess = e => {
                    const result = e.target.result || [];
                    setMangas(result);
                };
            };
            useEffect(() => { loadMangas(); }, []);

            useEffect(() => {
                if (view === 'reader' && currentManga) {
                    initDB().then(db => {
                        db.transaction(STORE_PAGES).objectStore(STORE_PAGES).get(currentManga.id).onsuccess = e => {
                            if(e.target.result) {
                                setCurrentPages(e.target.result.pages || []);
                            }
                        }
                    });
                } else {
                    setCurrentPages([]); 
                }
            }, [view, currentManga]);

            const allSpreads = useMemo(() => {
                if(!currentManga || !currentPages || currentPages.length === 0) return [];
                let p = currentPages;
                const startName = currentManga.coverStart?.name; const endName = currentManga.coverEnd?.name; const doubleName = currentManga.coverDouble?.name;
                if (startName || endName || doubleName) p = p.filter(page => page.name !== startName && page.name !== endName && page.name !== doubleName);

                const spreads = []; 
                const isRTL = currentManga.direction === 'rtl'; 
                const hasDoubleCover = !!currentManga.coverDouble;
                
                if (effectiveLandscape) {
                    if (hasDoubleCover) {
                        spreads.push({ center: currentManga.coverDouble, info: "Jaquette Complète", pageIndices: [-1] });
                    } else if (currentManga.isDoubleCover && currentManga.coverStart && currentManga.coverEnd) {
                        if (isRTL) spreads.push({ left: currentManga.coverStart, right: currentManga.coverEnd, info: "Couvertures", pageIndices: [-1] });
                        else spreads.push({ left: currentManga.coverEnd, right: currentManga.coverStart, info: "Couvertures", pageIndices: [-1] });
                    } else {
                        const cover = currentManga.coverStart || currentManga.cover;
                        if (cover) {
                            if (isRTL) spreads.push({ left: cover, right: null, info: "Couverture", pageIndices: [-1] });
                            else spreads.push({ left: null, right: cover, info: "Couverture", pageIndices: [-1] });
                        }
                    }
                    for (let i = 0; i < p.length; i += 2) {
                        const next = p[i+1];
                        if (!next) {
                            if (isRTL) spreads.push({ left: null, right: p[i], info: `Page ${i+1}`, pageIndices: [i] });
                            else spreads.push({ left: p[i], right: null, info: `Page ${i+1}`, pageIndices: [i] });
                        }
                        else if (isRTL) spreads.push({ left: p[i+1], right: p[i], info: `Pages ${i+2} - ${i+1}`, pageIndices: [i, i+1] });
                        else spreads.push({ left: p[i], right: p[i+1], info: `Pages ${i+1} - ${i+2}`, pageIndices: [i, i+1] });
                    }
                    if (currentManga.coverEnd && !hasDoubleCover && !currentManga.isDoubleCover) {
                        if (isRTL) spreads.push({ left: null, right: currentManga.coverEnd, info: "Couverture Fin", pageIndices: [-2] });
                        else spreads.push({ left: currentManga.coverEnd, right: null, info: "Couverture Fin", pageIndices: [-2] });
                    }
                } else {
                    const startCover = currentManga.coverStart || currentManga.coverDouble || currentManga.cover;
                    if (startCover) spreads.push({ center: startCover, info: "Couverture Début", pageIndices: [-1] });
                    p.forEach((page, i) => spreads.push({ center: page, info: `Page ${i+1}`, pageIndices: [i] }));
                    if (currentManga.coverEnd) spreads.push({ center: currentManga.coverEnd, info: "Couverture Fin", pageIndices: [-2] });
                }
                return spreads;
            }, [currentManga, currentPages, effectiveLandscape]);

            useEffect(() => {
                if (view !== 'reader' || !allSpreads.length) {
                    clearImageCache();
                    return;
                }
                
                const neededFiles = new Set();
                const addSpreadToNeeded = (index) => {
                    const spread = allSpreads[index];
                    if (spread) {
                        if (spread.left) neededFiles.add(spread.left);
                        if (spread.right) neededFiles.add(spread.right);
                        if (spread.center) neededFiles.add(spread.center);
                    }
                };

                for (let i = cursor - 2; i <= cursor + 3; i++) addSpreadToNeeded(i);
                if (prevCursor !== null) addSpreadToNeeded(prevCursor);
                if (drag.targetCursor !== null) addSpreadToNeeded(drag.targetCursor);

                for (const [file, url] of globalImageCache.entries()) {
                    if (!neededFiles.has(file)) {
                        URL.revokeObjectURL(url);
                        globalImageCache.delete(file);
                    }
                }

                neededFiles.forEach(file => {
                    if (!globalImageCache.has(file)) {
                        const url = getCachedUrl(file);
                        if (url) {
                            const img = new Image();
                            img.src = url; 
                        }
                    }
                });
            }, [cursor, prevCursor, drag.targetCursor, allSpreads, view]);

            const handleOpenManga = useCallback((m, e, skipAnimation = false) => {
                if (skipAnimation) {
                    setCurrentManga(m); 
                    setCursor(m.bookmark != null ? m.bookmark : (m.progress || 0)); 
                    setView('reader'); 
                    setZenMode(true); 
                    markAsRead(m);
                    return;
                }
                let rect = { top: window.innerHeight / 2, left: window.innerWidth / 2, width: 0, height: 0 };
                if (e && e.currentTarget) {
                    const coverNode = e.currentTarget.querySelector('.manga-cover-image');
                    if (coverNode) rect = coverNode.getBoundingClientRect();
                    else rect = e.currentTarget.getBoundingClientRect();
                } else {
                    const fallback = document.getElementById('inspect-book-container');
                    if (fallback) rect = fallback.getBoundingClientRect();
                }
                setAnimatingManga({ manga: m, rect, phase: 'start' });
            }, []);

            useEffect(() => {
                if (animatingManga && animatingManga.phase === 'start') {
                    const rAF = requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            setAnimatingManga(prev => prev ? { ...prev, phase: 'expanding' } : null);
                        });
                    });
                    return () => cancelAnimationFrame(rAF);
                }
            }, [animatingManga?.phase]);

            useEffect(() => {
                if (animatingManga && animatingManga.phase === 'expanding') {
                    const timer = setTimeout(() => {
                        const m = animatingManga.manga;
                        setCurrentManga(m); 
                        setCursor(m.bookmark != null ? m.bookmark : (m.progress || 0)); 
                        setView('reader'); 
                        setZenMode(true); 
                        markAsRead(m);
                        
                        setTimeout(() => setAnimatingManga(null), 50); 
                    }, 500); 
                    return () => clearTimeout(timer);
                }
            }, [animatingManga?.phase]);

            const handleCloseReader = useCallback((e) => {
                if (e && e.stopPropagation) e.stopPropagation();
                if (currentManga && allSpreads) saveProgress(currentManga.id, cursor, cursor >= allSpreads.length - 1, allSpreads.length);
                setIsExitingReader(true);
                setTimeout(() => {
                    setView('hub'); 
                    setZenMode(false); 
                    loadMangas();
                    setIsExitingReader(false);
                }, 400);
            }, [currentManga, allSpreads, cursor]);

            const handleExport = async () => {
                setLoading(true); setImportProgress("Préparation export JSON...");
                try {
                    const db = await initDB();
                    
                    // On exécute les transactions l'une APRES l'autre pour éviter que le navigateur les ferme pour inactivité
                    const allMangasMeta = await new Promise(res => {
                        db.transaction(STORE_MANGAS, "readonly").objectStore(STORE_MANGAS).getAll().onsuccess = e => res(e.target.result);
                    });
                    
                    const allPages = await new Promise(res => {
                        db.transaction(STORE_PAGES, "readonly").objectStore(STORE_PAGES).getAll().onsuccess = e => res(e.target.result);
                    });
                    
                    const pagesMap = {};
                    allPages.forEach(p => pagesMap[p.id] = p.pages);

                    const encodedMangas = [];
                    for (let i = 0; i < allMangasMeta.length; i++) {
                        setImportProgress(`Compression... (${i+1}/${allMangasMeta.length})`);
                        const meta = allMangasMeta[i];
                        const fullManga = { ...meta, pages: pagesMap[meta.id] || [] };
                        
                        const encodeFile = async (f) => {
                            if (!f) return f;
                            const blob = deserializeFile(f);
                            if (!blob) return null;
                            return { name: blob.name || 'image.jpg', type: blob.type || 'image/jpeg', data: await blobToBase64Async(blob) };
                        };
                        
                        if (fullManga.coverDouble) fullManga.coverDouble = await encodeFile(fullManga.coverDouble);
                        if (fullManga.coverStart) fullManga.coverStart = await encodeFile(fullManga.coverStart);
                        if (fullManga.coverEnd) fullManga.coverEnd = await encodeFile(fullManga.coverEnd);
                        if (fullManga.cover) fullManga.cover = await encodeFile(fullManga.cover);
                        
                        const encPages = [];
                        for(let p of fullManga.pages) encPages.push(await encodeFile(p));
                        fullManga.pages = encPages;
                        
                        encodedMangas.push(fullManga);
                    }
                    
                    const json = JSON.stringify(encodedMangas);
                    const blob = new Blob([json], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a"); 
                    a.style.display = "none";
                    a.href = url; 
                    a.download = `MangaHub_Backup.json`; 
                    document.body.appendChild(a); // Injection vitale pour forcer le navigateur
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                    
                    setImportProgress(null); setLoading(false); setShowGlobalSettings(false); showToast("Sauvegarde exportée avec succès", "success");
                } catch (err) { console.error(err); showToast("Erreur lors de l'export.", "error"); setLoading(false); setImportProgress(null); }
            };

            const handleImport = async (e) => {
                const file = e.target.files[0]; if (!file) return;
                setLoading(true); setImportProgress("Lecture du fichier...");
                try {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            const db = await initDB();
                            
                            for (let i = 0; i < data.length; i++) {
                                setImportProgress(`Restauration... (${i+1}/${data.length})`);
                                const item = data[i];
                                
                                const decodeFile = async (f) => {
                                    if (!f || !f.data) return f;
                                    const blob = await base64ToBlobAsync(f.data, f.type);
                                    blob.name = f.name; 
                                    return await serializeFile(blob);
                                };

                                const meta = { ...item }; delete meta.pages;
                                if (meta.coverDouble) meta.coverDouble = await decodeFile(meta.coverDouble);
                                if (meta.coverStart) meta.coverStart = await decodeFile(meta.coverStart);
                                if (meta.coverEnd) meta.coverEnd = await decodeFile(meta.coverEnd);
                                if (meta.cover) meta.cover = await decodeFile(meta.cover);
                                meta.totalPages = item.pages ? item.pages.length : 0;
                                
                                const decPages = [];
                                if(item.pages) { for(let p of item.pages) decPages.push(await decodeFile(p)); }
                                
                                await new Promise((res, rej) => {
                                    const tx = db.transaction([STORE_MANGAS, STORE_PAGES], "readwrite");
                                    tx.objectStore(STORE_MANGAS).put(meta);
                                    tx.objectStore(STORE_PAGES).put({id: meta.id, pages: decPages});
                                    tx.oncomplete = res; tx.onerror = rej;
                                });
                            }
                            setLoading(false); setImportProgress(null); setShowGlobalSettings(false); e.target.value = ''; loadMangas(); showToast("Restauration terminée !", "success");
                        } catch(err) { console.error(err); showToast("Fichier invalide ou corrompu.", "error"); setLoading(false); setImportProgress(null); e.target.value = ''; }
                    };
                    reader.readAsText(file);
                } catch(err) { console.error(err); setLoading(false); setImportProgress(null); e.target.value = ''; }
            };

            const handleExportArchive = async (manga, format, e) => {
                if(e) e.stopPropagation(); setActiveCardMenu(null);
                setLoading(true); setImportProgress(`Création ${format.toUpperCase()}...`);
                try {
                    const db = await initDB();
                    const pagesData = await new Promise((res) => { db.transaction(STORE_PAGES).objectStore(STORE_PAGES).get(manga.id).onsuccess = ev => res(ev.target.result); });
                    const fullPages = pagesData ? (pagesData.pages || []).map(deserializeFile) : [];

                    const zip = new JSZip();
                    const metadata = { title: manga.title || "", group: manga.group || null, direction: manga.direction || "rtl", isDoubleCover: manga.isDoubleCover || false, tags: manga.tags || [], pages: [] };
                    const addFileToZip = (fileObj, nameBase) => {
                        if (!fileObj) return null;
                        const ext = fileObj.type === 'image/png' ? 'png' : fileObj.type === 'image/webp' ? 'webp' : 'jpg';
                        const filename = `${nameBase}.${ext}`; zip.file(filename, fileObj); return filename;
                    };
                    if (deserializeFile(manga.coverDouble)) metadata.coverDouble = addFileToZip(deserializeFile(manga.coverDouble), "cover_double");
                    if (deserializeFile(manga.coverStart)) metadata.coverStart = addFileToZip(deserializeFile(manga.coverStart), "cover_start");
                    if (deserializeFile(manga.coverEnd)) metadata.coverEnd = addFileToZip(deserializeFile(manga.coverEnd), "cover_end");
                    const fallbackCover = deserializeFile(manga.coverDouble || manga.coverStart || manga.cover); if (fallbackCover) addFileToZip(fallbackCover, "000_cover_preview"); 
                    if (fullPages.length > 0) { fullPages.forEach((p, i) => { const filename = addFileToZip(p, `page_${String(i+1).padStart(3,'0')}`); if (filename) metadata.pages.push(filename); }); }

            const saveProgress = async (mangaId, newCursor, isFinished = false, currentTotalSpreads = 0) => {

            const executeUpdateManga = async (e) => {

                tx.oncomplete = () => { setLoading(false); setEditingManga(null); setActiveCardMenu(null); loadMangas(); showToast("Manga mis à jour", "success"); };
            };

            const executePurge = async () => { setLoading(true); const db = await initDB(); const tx = db.transaction([STORE_MANGAS, STORE_PAGES], "readwrite"); tx.objectStore(STORE_MANGAS).clear(); tx.objectStore(STORE_PAGES).clear(); tx.oncomplete = () => window.location.reload(); };

            const getProgressPercent = (m) => {

            const executeBatchEdit = async (e) => {
                e.preventDefault();

                const tx = db.transaction(STORE_MANGAS, "readwrite");
                const store = tx.objectStore(STORE_MANGAS);
                
                Array.from(selectedMangas).forEach(id => {
                    store.get(id).onsuccess = (ev) => {

            }, [mangas, search, activeTags, showBookmarksOnly]);

            const prevOrientation = useRef(effectiveLandscape);
            const prevSpreadsRef = useRef(allSpreads);

            useEffect(() => {
                if (prevOrientation.current !== effectiveLandscape && allSpreads && allSpreads.length > 0) {
                    const oldSpreads = prevSpreadsRef.current; const currentSpread = oldSpreads[cursor];
                    if (currentSpread && currentSpread.pageIndices) {
                        const isRTL = currentManga?.direction === 'rtl'; let targetPage = currentSpread.pageIndices[0];
                        if (prevOrientation.current === true && effectiveLandscape === false && currentSpread.pageIndices.length === 2) { targetPage = isRTL ? currentSpread.pageIndices[0] : currentSpread.pageIndices[1]; }
                        const newCursor = allSpreads.findIndex(s => s.pageIndices.includes(targetPage));
                        if (newCursor !== -1 && newCursor !== cursor) { setCursor(newCursor); }

            useEffect(() => {
                const handleKeyDown = (e) => {

                    const isRTL = currentManga?.direction === 'rtl';
                    if (e.key === 'Escape') { handleCloseReader(); return; }
                    if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); return; }

                    if (e.key === 'ArrowRight' || (e.key === ' ' && !e.shiftKey)) {

                        if (goNext) { if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1, 'right'); else { setShowNextChapterOverlay(true); triggerHaptic([50, 100, 50]); } } 
                        else { if (showNextChapterOverlay) setShowNextChapterOverlay(false); else if (cursor > 0) handleSetCursor(cursor - 1, 'right'); }
                    } else if (e.key === 'ArrowLeft' || e.key === 'Backspace' || (e.key === ' ' && e.shiftKey)) {
                        if (e.key === ' ' || e.key === 'Backspace') e.preventDefault(); const goNext = isRTL && e.key === 'ArrowLeft' ? true : false;
                        if (goNext) { if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1, 'left'); else { setShowNextChapterOverlay(true); triggerHaptic([50, 100, 50]); } } 
                        else { if (showNextChapterOverlay) setShowNextChapterOverlay(false); else if (cursor > 0) handleSetCursor(cursor - 1, 'left'); }
                    } else if (e.key === 'ArrowUp') { setZenMode(prev => !prev); }
                };
                window.addEventListener('keydown', handleKeyDown);

            }, [view, cursor, allSpreads, showNextChapterOverlay, isAdding, showGlobalSettings, currentManga, activeCardMenu, handleCloseReader]);

            const wheelTimeout = useRef(null);

                const isRTL = currentManga?.direction === 'rtl';
                let goNext = false; let goPrev = false;

                if (e.deltaY > 40) { goNext = isRTL ? false : true; goPrev = isRTL ? true : false; }
                else if (e.deltaY < -40) { goNext = isRTL ? true : false; goPrev = isRTL ? false : true; }

                if (goNext) {
                    if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1, isRTL ? 'left' : 'right');
                    else { setShowNextChapterOverlay(true); triggerHaptic([50, 100, 50]); }
                } else if (goPrev) {
                    if (cursor > 0) handleSetCursor(cursor - 1, isRTL ? 'right' : 'left');
                }

                if (goNext || goPrev) {
                    wheelTimeout.current = setTimeout(() => { wheelTimeout.current = null; }, 600);
                }
            }, [view, cursor, allSpreads, currentManga, showNextChapterOverlay]);

            const isPhysicalAnimating = drag.active || drag.snapping;
            let physicalStyles = null;
            if (isPhysicalAnimating) {
                const isRTL = currentManga?.direction === 'rtl'; const p = drag.progress; const trans = drag.snapping ? 'transform 0.4s cubic-bezier(0.15, 0.9, 0.3, 1), filter 0.4s' : 'none';
                const brightness = 1 - (Math.sin(p * Math.PI) * 0.4); 
                const filterStyle = `brightness(${brightness})`;
                let singleAngle = 0; let singleOrigin = 'center'; let leftStyle = {}; let rightStyle = {};

                if (isRTL) {
                    if (drag.dir === 'next') { singleAngle = -90 + (p * 90); singleOrigin = 'left center'; rightStyle = { transform: `perspective(2000px) rotateY(${-90 + (p * 90)}deg)`, transformOrigin: 'left center', transition: trans, filter: filterStyle }; }
                    if (drag.dir === 'prev') { singleAngle = 90 - (p * 90); singleOrigin = 'right center'; leftStyle = { transform: `perspective(2000px) rotateY(${90 - (p * 90)}deg)`, transformOrigin: 'right center', transition: trans, filter: filterStyle }; }
                } else {
                    if (drag.dir === 'next') { singleAngle = 90 - (p * 90); singleOrigin = 'right center'; leftStyle = { transform: `perspective(2000px) rotateY(${90 - (p * 90)}deg)`, transformOrigin: 'right center', transition: trans, filter: filterStyle }; }
                    if (drag.dir === 'prev') { singleAngle = -90 + (p * 90); singleOrigin = 'left center'; rightStyle = { transform: `perspective(2000px) rotateY(${-90 + (p * 90)}deg)`, transformOrigin: 'left center', transition: trans, filter: filterStyle }; }
                }
                physicalStyles = { single: { transform: `perspective(2000px) rotateY(${singleAngle}deg)`, transformOrigin: singleOrigin, transition: trans, filter: filterStyle }, left: leftStyle, right: rightStyle };
            }

            const handlePointerDown = (e) => {
                if (showNextChapterOverlay || prevCursor !== null) return;
                if (e.target.tagName?.toLowerCase() === 'input' || e.target.closest('button')) return;
                if (window.visualViewport && window.visualViewport.scale > 1.05) return;
                e.target.setPointerCapture(e.pointerId); setDrag({ active: true, startX: e.clientX, diffX: 0, progress: 0, dir: null, targetCursor: null, snapping: false });
            };

            const handlePointerMove = (e) => {
                if (!drag.active || !allSpreads || (window.visualViewport && window.visualViewport.scale > 1.05)) return;
                const clientX = e.clientX; const isRTL = currentManga?.direction === 'rtl';
                if (dragRaf.current) cancelAnimationFrame(dragRaf.current);
                dragRaf.current = requestAnimationFrame(() => {
                    setDrag(prev => {
                        const diffX = clientX - prev.startX; let dir = null;
                        if (diffX > 5) dir = isRTL ? 'next' : 'prev'; else if (diffX < -5) dir = isRTL ? 'prev' : 'next';
                        let targetCursor = null; if (dir === 'next') targetCursor = cursor + 1; if (dir === 'prev') targetCursor = cursor - 1;
                        let progress = 0;
                        if (targetCursor !== null && targetCursor >= 0 && targetCursor < allSpreads.length) progress = Math.min(1, Math.abs(diffX) / window.innerWidth);
                        else progress = Math.min(0.15, Math.abs(diffX) / (window.innerWidth * 3)); 
                        return { ...prev, diffX, dir, targetCursor, progress };
                    });
                });
            };

            const handlePointerUp = (e) => {
                if (dragRaf.current) cancelAnimationFrame(dragRaf.current);

                const isClick = Math.abs(drag.diffX) < 10;
                if (isClick) {

                        const isRTL = currentManga?.direction === 'rtl';
                        const clickedRight = x >= w*0.70; const clickedLeft = x <= w*0.30;
                        let goNext = false; let goPrev = false;
                        if (clickedRight) { goNext = isRTL ? false : true; goPrev = isRTL ? true : false; }
                        else if (clickedLeft) { goNext = isRTL ? true : false; goPrev = isRTL ? false : true; }
                        if (goNext) { if (cursor < allSpreads.length - 1) handleSetCursor(cursor + 1, clickedRight ? 'right' : 'left'); else { setShowNextChapterOverlay(true); triggerHaptic([50, 100, 50]); } } 
                        else if (goPrev) { if (showNextChapterOverlay) setShowNextChapterOverlay(false); else if (cursor > 0) handleSetCursor(cursor - 1, clickedRight ? 'right' : 'left'); }
                    }
                    return;
                }

                if (drag.progress > 0.20 && drag.targetCursor !== null && drag.targetCursor >= 0 && drag.targetCursor < allSpreads.length) {
                    triggerHaptic(30);

                    setTimeout(() => {

                        // Réinitialisation instantanée au lieu d'attendre 150ms de plus

                    }, 400);
                } else {
                    if (drag.targetCursor !== null && drag.targetCursor >= allSpreads.length && drag.progress > 0.1) { setShowNextChapterOverlay(true); triggerHaptic([50, 100, 50]); }
                    setDrag(prev => ({ ...prev, active: false, snapping: 'backward', progress: 0 }));
                    setTimeout(() => { setDrag({ active: false, startX: 0, diffX: 0, progress: 0, dir: null, targetCursor: null, snapping: false }); }, 400);
                }

            const continueReadingManga = useMemo(() => {

            return (

                            setShowGlobalSettings={setShowGlobalSettings} appTheme={appTheme} setAppTheme={setAppTheme} shelfTheme={shelfTheme} setShelfTheme={setShelfTheme}
                            handleExport={handleExport} handleImport={handleImport} setPurgeConfirm={setPurgeConfirm} showTags={showTags}
                            setShowTags={setShowTags} activeTags={activeTags} setActiveTags={setActiveTags} libraryStructure={libraryStructure} continueReadingManga={continueReadingManga}
                            handleOpenManga={handleOpenManga} getProgressPercent={getProgressPercent} setActiveCardMenu={setActiveCardMenu}
                            isSelectionMode={isSelectionMode} selectedMangas={selectedMangas}
                            toggleMangaSelection={toggleMangaSelection} toggleSelectionMode={toggleSelectionMode} setShowBatchEditModal={setShowBatchEditModal}
                            setBatchDeleteConfirm={setBatchDeleteConfirm} setInspectingManga={setInspectingManga}

                    )}

                            handleCloseReader={handleCloseReader} currentTime={currentTime} toggleFullscreen={toggleFullscreen} toggleBookmark={toggleBookmark} currentManga={currentManga}
                            cursor={cursor} handleSetCursor={handleSetCursor} edgeGlow={edgeGlow} currentPages={currentPages} allSpreads={allSpreads} isLandscape={effectiveLandscape}
                            prevCursor={prevCursor} isPhysicalAnimating={isPhysicalAnimating} slideDir={slideDir} drag={drag} physicalStyles={physicalStyles}
                            handlePointerDown={handlePointerDown} handlePointerMove={handlePointerMove} handlePointerUp={handlePointerUp} handleWheel={handleWheel}
                            showNextChapterOverlay={showNextChapterOverlay} setShowNextChapterOverlay={setShowNextChapterOverlay} nextChapter={nextChapter} saveProgress={saveProgress}

                        />

                    {inspectingManga && (

                                setInspectingManga(null);

                            }}
                            hasPrev={!!inspectorPrev}
                            hasNext={!!inspectorNext}

                            onNext={() => { triggerHaptic(30); setInspectingManga(inspectorNext); }}

                    <ConfirmModal 
                        isOpen={deleteConfirm !== null || purgeConfirm || batchDeleteConfirm} 
                        title={batchDeleteConfirm ? `Supprimer ${selectedMangas.size} mangas ?` : "Confirmer ?"}
                        onCancel={() => { setDeleteConfirm(null); setPurgeConfirm(false); setBatchDeleteConfirm(false); }} 
                        onConfirm={() => { 
                            if (batchDeleteConfirm) { executeBatchDelete(); }
                            else if (deleteConfirm) { initDB().then(db => { const tx = db.transaction([STORE_MANGAS, STORE_PAGES], "readwrite"); tx.objectStore(STORE_MANGAS).delete(deleteConfirm); tx.objectStore(STORE_PAGES).delete(deleteConfirm); tx.oncomplete = () => { setDeleteConfirm(null); loadMangas(); showToast("Manga supprimé", "error"); }; }); } 
                            else { executePurge(); } 
                        }} 
                    />
                    {isAdding && (<AddChapterModal onClose={() => setIsAdding(false)} onSuccess={() => { setIsAdding(false); loadMangas(); }} setLoading={setLoading} setImportProgress={setImportProgress} showToast={showToast} existingGroups={existingGroups} />)}
                    <LoadingOverlay loading={loading} importProgress={importProgress} />
                    <ToastNotification toast={toast} />

                    {animatingManga && (
                        <div className="fixed inset-0 z-[2000] pointer-events-none">
                            <div className="absolute inset-0 bg-black transition-opacity duration-[500ms] ease-[cubic-bezier(0.22,1,0.36,1)]" style={{ opacity: animatingManga.phase === 'expanding' ? 1 : 0 }} />
                            <div className="absolute overflow-hidden transition-[top,left,width,height,border-radius] duration-[500ms] ease-[cubic-bezier(0.22,1,0.36,1)] shadow-[0_30px_60px_rgba(0,0,0,0.9)]"
                                style={{ top: animatingManga.phase === 'expanding' ? '0px' : animatingManga.rect.top + 'px', left: animatingManga.phase === 'expanding' ? '0px' : animatingManga.rect.left + 'px', width: animatingManga.phase === 'expanding' ? '100vw' : animatingManga.rect.width + 'px', height: animatingManga.phase === 'expanding' ? '100vh' : animatingManga.rect.height + 'px', borderRadius: animatingManga.phase === 'expanding' ? '0px' : '16px', transform: 'translateZ(0)' }}>
                                <AnimatedCover file={animatingManga.manga.coverDouble || animatingManga.manga.coverStart || animatingManga.manga.cover} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                if (window.location.protocol !== 'blob:') {
                    navigator.serviceWorker.register('./sw.js')
                        .then(reg => console.log('Service Worker enregistré !', reg))
                        .catch(err => console.error('Erreur Service Worker', err));
                }
            });
        }
    </script>
</body>
</html>
